schema_path: configs/data_schema.yaml

model:
  model_path: outputs/models/surrogate_model.pt
  input_scaler_path: outputs/models/input_scaler.pkl
  output_scaler_path: outputs/models/output_scaler.pkl
  model_meta_path: outputs/models/model_meta.json

optimizer:
  name: ga
  population_size: 60
  generations: 100
  crossover_rate: 0.85
  mutation_rate: 0.12
  mutation_scale: 0.08
  elite_size: 2
  tournament_size: 3
  random_state: 42

objective:
  target: torque_Nm
  direction: maximize

paths:
  output_dir: outputs/optimization
